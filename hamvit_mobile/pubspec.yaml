name: hamvit_mobile
description: HAMVIT mobile-first app
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  supabase_flutter: ^2.6.0
  drift: ^2.18.0
  hive: ^2.2.3
  intl: ^0.20.2
  image_picker: ^1.1.2
  geolocator: ^12.0.0
  fl_chart: ^0.68.0
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.2
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/inicio.png"
  adaptive_icon_background: "#071A2D"
  adaptive_icon_foreground: "assets/branding/inicio.png"
  adaptive_icon_foreground_inset: 18
